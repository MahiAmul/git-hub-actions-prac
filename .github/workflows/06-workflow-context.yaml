name: 06-workflow-context
run-name: 06 -context | DEBUG - ${{ inputs.debug }}

on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: "Enable debug mode"
        default: false
env:
  MY_VARIABLE_WORKFLOW: "This is a custom variable"
  MY_OVERWRITTEN_VAR: "Workflow level variable that will be overwritten in the job"
jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      MY_VARIABLE_JOB: "This is a custom variable for the job"
      MY_OVERWRITTEN_VAR: "Job level variable that overwrites the workflow level variable"
    steps:
      - name: display information
        run: |
          echo "Workflow Name: ${{ github.workflow }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
      - name: var context
        run: |
          echo "GITHUB_WORKFLOW: $GITHUB_WORKFLOW"
          echo "GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "GITHUB_ACTOR: $GITHUB_ACTOR"
      - name: reterive variable
        run: |
          echo "variable Name: ${{ vars.MY_VARIABLE }}"
      - name: env context
        run: |
          echo "workflow enve ${{env.MY_VARIABLE_WORKFLOW}}"
          echo "job enve ${{env.MY_VARIABLE_JOB}}"
          echo "job enve ${{env.MY_OVERWRITTEN_VAR}}"