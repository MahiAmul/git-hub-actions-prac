name: 08-using variables

on:
  push:
    workflow_dispatch:

env:
  WORKFLOW_DIR: 'I am workfloe env var'
  OVERWRITTEN: 'I will be overwritten'
  UNDEFINED_VAR_WITH_DEFAULT: ${{ vars.UNDEFINED_VAR || 'default value' }}
jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_DIR: 'I am job env var'
      OVERWRITTEN: 'I will be overwritten by step env var'
    steps:
      - name: Echo workflow and job variables
        env:
          STEP_VAR: 'I am step env var'
          OVERWRITTEN: 'I am the final value of overwritten variable'
        run: |
          echo "Workflow variable: $WORKFLOW_DIR"
          echo "Job variable: $JOB_DIR"
          echo "Overwritten variable: $OVERWRITTEN"

  echo2:
    runs-on: ubuntu-latest
    steps:
      - name: print variables
        run: |
          echo "Org var : ${{ vars.ORG_VAR }}"
          echo "Org overwritten var : ${{ vars.OVERWRITTEN_VAR }}"
          echo "Repo var :${{ vars.REPOSITORY_VAR }}"

  echo-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: print  variables
        run: |
          echo "Org var : ${{ vars.ORG_VAR }}"
          echo "Org overwritten var : ${{ vars.OVERWRITTEN_VAR }}"
          echo "Repo var :${{ vars.REPOSITORY_VAR }}"
          echo "Env var : ${{ vars.TARGET_VAR }}"

  echo-undefined:
    runs-on: ubuntu-latest
    steps:
      - name: print undefined variable
        run: |
          echo "Undefined var : ${{ env.UNDEFINED_VAR_WITH_DEFAULT }}"